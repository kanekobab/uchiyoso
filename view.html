      // ── Helpers ─────────────────────────────────────────────────────────
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      // Render a read-only dual-range bar (matches index.html visual style)
      function renderDualBar(value, field) {
        if (!value || typeof value !== "object") return null;
        const vMin = value.min ?? 0;
        const vMax = value.max ?? 10;
        const absMin = field.absMin ?? 0;
        const absMax = field.absMax ?? 10;
        const range = absMax - absMin;
        if (range === 0) return null;
        const pMin = ((vMin - absMin) / range) * 100;
        const pMax = ((vMax - absMin) / range) * 100;
        const tc = Math.min(absMax - absMin + 1, 11);
        const ticks = Array.from({ length: tc }, () => "<span></span>").join("");
        return (
          `<div class="dual-range-wrap vr-readonly changed">` +
          `<div class="dual-range-track">` +
          `<div class="dr-bg"></div>` +
          `<div class="dr-fill" style="left:${pMin.toFixed(1)}%;width:${(pMax - pMin).toFixed(1)}%"></div>` +
          `<input type="range" class="dr-input" min="${absMin}" max="${absMax}" value="${vMin}">` +
          `<input type="range" class="dr-input" min="${absMin}" max="${absMax}" value="${vMax}">` +
          `</div>` +
          `<div class="slider-ticks">${ticks}</div>` +
          `</div>`
        );
      }

      // ── 値レンダー ────────────────────────────────────────────────────
      function renderValue(field, value) {
        if (value === undefined || value === null) return null;

        switch (field.type) {
          case "text": {
            const s = String(value).trim();
            if (!s) return null;
            return `<span class="v-text">${esc(s).replace(/\n/g, "<br>")}</span>`;
          }
          case "tags": {
            if (!Array.isArray(value) || !value.length) return null;
            return `<div class="v-tags">${value
              .map((t) => `<span class="v-tag">${esc(t)}</span>`)
              .join("")}</div>`;
          }
          case "tags_map": {
            if (!Array.isArray(value) || !value.length) return null;
            return `<div class="v-tags">${value
              .map(
                (t) => `<span class="v-tag">${esc(field.map[t] || t)}</span>`,
              )
              .join("")}</div>`;
          }
          case "radio_map": {
            if (!value) return null;
            return `<span class="v-text">${esc(field.map[value] || value)}</span>`;
          }
          case "range": {
            return renderDualBar(value, field);
          }
          case "num_of_10": {
            if (value === undefined || value === null) return null;
            return `<span class="v-range">${value} / 10</span>`;
          }
          case "tog_tags": {
            if (!Array.isArray(value) || !value.length) return null;
            const good = value.filter((t) => !t.startsWith("!"));
            const bad = value
              .filter((t) => t.startsWith("!"))
              .map((t) => t.slice(1));
            if (!good.length && !bad.length) return null;
            let html = "";
            if (good.length) {
              html += `<div class="v-tog-block"><div class="v-tog-sublabel">♡ 好き</div><div class="v-tags">${good
                .map((t) => `<span class="v-tag v-tag-good">${esc(t)}</span>`)
                .join("")}</div></div>`;
            }
            if (bad.length) {
              html += `<div class="v-tog-block"><div class="v-tog-sublabel">✕ 苦手・嫌い</div><div class="v-tags">${bad
                .map((t) => `<span class="v-tag v-tag-bad">${esc(t)}</span>`)
                .join("")}</div></div>`;
            }
            return html;
          }
          case "contact_conds": {
            if (
              !value ||
              typeof value !== "object" ||
              !Object.keys(value).length
            )
              return null;
            return Object.entries(value)
              .map(([item, conds]) => {
                const condLabels = Array.isArray(conds)
                  ? conds.map((v) => UNLOCK_MAP[v] || v).join("、")
                  : "";
                return `<div class="v-cond-item"><span class="v-cond-item-label">「${esc(item)}」の解放条件</span><span class="v-cond-item-body">${esc(condLabels)}</span></div>`;
              })
              .join("");
          }
          default:
            return `<span class="v-text">${esc(String(value))}</span>`;
        }
      }

      // ── HTML構築 ─────────────────────────────────────────────────────
      function buildHTML(data) {
        const cards = CATEGORIES.map((cat) => {
          const catData = data[cat.key];
          if (!catData || typeof catData !== "object") return "";

          const rows = cat.fields
            .map((field) => {
              const value = catData[field.key];
              const rendered = renderValue(field, value);
              if (!rendered) return "";
              return `<div class="v-row"><div class="v-label">${esc(field.label)}</div><div class="v-value">${rendered}</div></div>`;
            })
            .filter(Boolean)
            .join("");

          if (!rows) return "";
          return `<div class="v-card"><div class="v-card-title">${cat.title}</div><div class="v-card-body">${rows}</div></div>`;
        })
          .filter(Boolean)
          .join("");

        return cards || `<div class="v-empty">入力内容がありません</div>`;
      }

      // ── Toast ────────────────────────────────────────────────────────
      let toastTimer;
      function showToast(msg, isErr = false) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show" + (isErr ? " error" : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
      }

      // ── Bootstrap ────────────────────────────────────────────────────
      async function init() {
        const mainEl = document.getElementById("mainEl");

        // URL から id 取得
        const id = new URLSearchParams(location.search).get("id");
        if (!id) {
          mainEl.innerHTML = `<div class="state-wrap error">URLにidが含まれていません。<br>正しい共有URLからアクセスしてください。</div>`;
          return;
        }

        // Firestore からデータ取得
        try {
          const snap = await getDoc(doc(db, "pairs", id));

          if (!snap.exists()) {
            mainEl.innerHTML = `<div class="state-wrap error">データが見つかりません。<br>URLが正しいか確認してください。</div>`;
            return;
          }

          const docData = snap.data();
          const data = docData.data || {};

          // コンテンツ描画
          mainEl.innerHTML = buildHTML(data);
        } catch (e) {
          console.error(e);
          mainEl.innerHTML = `<div class="state-wrap error">読み込みに失敗しました。<br><button class="state-retry" onclick="location.reload()">再読み込み</button></div>`;
        }

        // URL コピー
        document
          .getElementById("copyBtn")
          .addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(location.href);
              showToast("URLをコピーしました 🔗");
            } catch {
              prompt("このURLをコピーしてください：", location.href);
            }
          });

        // 内容を変更 → index.html?id=<docId> に遷移
        document
          .getElementById("editContentBtn")
          .addEventListener("click", () => {
            window.location.href = `./index.html?id=${id}`;
          });
      }
