<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0"
    />
    <title>シートをカスタマイズ</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="page-editor">
    <header class="hd">
      <div class="hd-top">
        <input
          type="text"
          id="templateNameInput"
          class="hd-name-input"
          placeholder="◯◯さん用（未入力：無題テンプレート）"
          maxlength="60"
        />
        <div class="hd-acts">
          <button class="btn btn-save" id="saveBtn">
            💾 保存してシートを開く
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="page-columns">
        <div class="col" id="col-left">
          <div class="col-heading col-heading-left">
            <div class="col-heading-title">ヒアリング</div>
            <div class="col-heading-desc">
              やりたい方向性の確認やすり合わせ用になります
            </div>
          </div>
          <div id="left-editor"></div>
        </div>
        <div class="col" id="col-right">
          <div class="col-heading col-heading-right">
            <div class="col-heading-title">相手側PCの希望</div>
            <div class="col-heading-desc">
              今回希望する相手側のPCイメージや要望を記入してください
            </div>
          </div>
          <div id="right-editor"></div>
        </div>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        addDoc,
        setDoc,
        collection,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import { EDITOR_SCHEMA } from "./js/schema.js";

      const app = initializeApp({
        apiKey: "AIzaSyADW4T9k6itj9a1hhCmi3ybkyTc9dbTDv0",
        authDomain: "trpg-36eac.firebaseapp.com",
        projectId: "trpg-36eac",
        storageBucket: "trpg-36eac.firebasestorage.app",
        messagingSenderId: "696095523246",
        appId: "1:696095523246:web:c9b543d8521b858d3a483f",
      });
      const db = getFirestore(app);

      // ── Helpers ──────────────────────────────────────────────────────────
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");

      // ── Toast / Status ────────────────────────────────────────────────────
      let toastTimer;
      function showToast(msg, isErr = false) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show" + (isErr ? " err" : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          el.className = "toast";
        }, 3000);
      }
      function setStatus(msg, cls = "") {
        const el = document.getElementById("statusEl");
        if (!el) return;
        el.textContent = msg;
        el.className = cls;
      }

      // ── Schema ────────────────────────────────────────────────────────────
      // EDITOR_SCHEMA は js/schema.js からインポート済み。
      // side: "left" | "right" — maps to the column where this section lives
      // fields[].type: human-readable input type shown as a badge
      // fields[].options: optional [[value, label], ...] for per-option ON/OFF

      // (ここから下の OPT_* 定数・EDITOR_SCHEMA 定義は schema.js に移管済み)

      // ── State ────────────────────────────────────────────────────────────
      let currentTemplateId = null; // null = 新規作成 / string = 既存テンプレートの更新

      // ── Build editor UI ───────────────────────────────────────────────────
      // Annotation inputs for a section (before/after the entire section body)
      // hidden by default — toggled open by the ＋ button in .e-sec-hd
      function buildSectionAnnotsHtml() {
        return `<div class="e-sec-annots hidden">
          <span class="e-annots-head">注釈（セクション）</span>
          <div class="e-annot-row">
            <span class="e-annot-label">先頭</span>
            <textarea class="e-annot-input" data-annot="before" rows="1" placeholder="セクション先頭に表示するテキスト（空白で非表示）"></textarea>
          </div>
          <div class="e-annot-row">
            <span class="e-annot-label">末尾</span>
            <textarea class="e-annot-input" data-annot="after" rows="1" placeholder="セクション末尾に表示するテキスト（空白で非表示）"></textarea>
          </div>
        </div>`;
      }
      // Annotation inputs for a single field (before/after that field)
      // hidden by default — toggled open by the ＋ button in .e-field-main
      function buildFieldAnnotsHtml() {
        return `<div class="e-field-annots hidden">
          <span class="e-annots-head">注釈</span>
          <div class="e-annot-row">
            <span class="e-annot-label">上に表示</span>
            <textarea class="e-annot-input" data-annot="before" rows="1" placeholder="この項目の直前に表示するテキスト（空白で非表示）"></textarea>
          </div>
          <div class="e-annot-row">
            <span class="e-annot-label">下に表示</span>
            <textarea class="e-annot-input" data-annot="after" rows="1" placeholder="この項目の直後に表示するテキスト（空白で非表示）"></textarea>
          </div>
        </div>`;
      }

      function buildOptionsHtml(field) {
        if (!field.options || field.options.length === 0) return "";
        const chips = field.options
          .map(
            ([v, l]) => `
            <span class="e-option" data-opt-key="${esc(v)}">
              <label class="tog-sw-sm" title="${esc(v)}">
                <input type="checkbox" class="opt-vis-tog" checked>
                <span class="tog-sw-sm-track"></span>
              </label>
              <span class="e-option-label">${esc(l)}</span>
            </span>`,
          )
          .join("");
        return `<div class="e-options">
          <span class="e-options-head">選択肢 ON/OFF</span>
          ${chips}
        </div>`;
      }

      function buildEditorSection(sec) {
        const fieldRows = sec.fields
          .map(
            (field) => `
            <div class="e-field" data-field-key="${field.key}">
              <div class="e-field-main">
                <label class="tog-sw" title="表示切替: ${field.key}">
                  <input type="checkbox" class="field-vis-tog" checked>
                  <span class="tog-sw-track"></span>
                </label>
                <input
                  type="text"
                  class="e-field-label-input"
                  value="${esc(field.label)}"
                  placeholder="${esc(field.label)}"
                  title="クリックして編集"
                >
                <span class="e-field-type">${field.type}</span>
                <button type="button" class="e-toggle-field-annots" title="注釈を編集">＋</button>
              </div>
              ${buildOptionsHtml(field)}
              ${buildFieldAnnotsHtml()}
            </div>`,
          )
          .join("");

        return `
          <div class="e-sec" data-section-id="${sec.id}">
            <div class="e-sec-hd">
              <label class="tog-sw" title="セクション表示切替: ${sec.id}">
                <input type="checkbox" class="sec-vis-tog" checked>
                <span class="tog-sw-track"></span>
              </label>
              <input
                type="text"
                class="e-sec-title-input"
                value="${esc(sec.title)}"
                placeholder="${esc(sec.title)}"
                title="クリックして編集"
              >
              <button type="button" class="e-toggle-annots" title="注釈を編集">＋</button>
            </div>
            ${buildSectionAnnotsHtml()}
            <div class="e-fields">${fieldRows}</div>
          </div>`;
      }

      function buildEditorUI() {
        const leftEl = document.getElementById("left-editor");
        const rightEl = document.getElementById("right-editor");

        EDITOR_SCHEMA.forEach((sec) => {
          const html = buildEditorSection(sec);
          (sec.side === "left" ? leftEl : rightEl).insertAdjacentHTML(
            "beforeend",
            html,
          );
        });

        // Section toggle → dim card
        document.querySelectorAll(".sec-vis-tog").forEach((tog) => {
          tog.addEventListener("change", () => {
            tog.closest(".e-sec").classList.toggle("e-off", !tog.checked);
          });
        });

        // Field toggle → dim row
        document.querySelectorAll(".field-vis-tog").forEach((tog) => {
          tog.addEventListener("change", () => {
            tog.closest(".e-field").classList.toggle("e-off", !tog.checked);
          });
        });

        // Option toggle → dim chip
        document.querySelectorAll(".opt-vis-tog").forEach((tog) => {
          tog.addEventListener("change", () => {
            tog.closest(".e-option").classList.toggle("e-off", !tog.checked);
          });
        });

        // Section annotation toggle (＋ / －)
        document.querySelectorAll(".e-toggle-annots").forEach((btn) => {
          btn.addEventListener("click", () => {
            const annots = btn.closest(".e-sec").querySelector(".e-sec-annots");
            if (!annots) return;
            const isNowHidden = annots.classList.toggle("hidden");
            btn.textContent = isNowHidden ? "＋" : "－";
            btn.classList.toggle("open", !isNowHidden);
          });
        });

        // Field annotation toggle (＋ / －)
        document.querySelectorAll(".e-toggle-field-annots").forEach((btn) => {
          btn.addEventListener("click", () => {
            const annots = btn
              .closest(".e-field")
              .querySelector(".e-field-annots");
            if (!annots) return;
            const isNowHidden = annots.classList.toggle("hidden");
            btn.textContent = isNowHidden ? "＋" : "－";
            btn.classList.toggle("open", !isNowHidden);
          });
        });
      }

      // ── Collect template data ─────────────────────────────────────────────
      function collectTemplate() {
        const sections = {};
        const labels = {};
        const visibility = {};
        const options = {};
        const annotations = {};

        EDITOR_SCHEMA.forEach((sec) => {
          const secEl = document.querySelector(`[data-section-id="${sec.id}"]`);
          if (!secEl) return;

          const secTog = secEl.querySelector(".sec-vis-tog");
          const secTitleInput = secEl.querySelector(".e-sec-title-input");

          sections[sec.id] = {
            visible: secTog ? secTog.checked : true,
            title:
              secTitleInput && secTitleInput.value.trim()
                ? secTitleInput.value.trim()
                : sec.title,
          };

          // Section-level annotations
          const secAnnotArea = secEl.querySelector(".e-sec-annots");
          if (secAnnotArea) {
            const before =
              secAnnotArea
                .querySelector('[data-annot="before"]')
                ?.value.trim() || "";
            const after =
              secAnnotArea
                .querySelector('[data-annot="after"]')
                ?.value.trim() || "";
            if (before || after) annotations[sec.id] = { before, after };
          }

          sec.fields.forEach((field) => {
            const fieldEl = secEl.querySelector(
              `[data-field-key="${field.key}"]`,
            );
            if (!fieldEl) return;

            const fieldTog = fieldEl.querySelector(".field-vis-tog");
            const fieldLabelInput = fieldEl.querySelector(
              ".e-field-label-input",
            );

            visibility[field.key] = fieldTog ? fieldTog.checked : true;
            labels[field.key] =
              fieldLabelInput && fieldLabelInput.value.trim()
                ? fieldLabelInput.value.trim()
                : field.label;

            // Collect option visibility states
            if (field.options) {
              const optMap = {};
              fieldEl.querySelectorAll(".e-option").forEach((optEl) => {
                const v = optEl.dataset.optKey;
                const tog = optEl.querySelector(".opt-vis-tog");
                optMap[v] = tog ? tog.checked : true;
              });
              options[field.key] = optMap;
            }

            // Field-level annotations
            const fieldAnnotArea = fieldEl.querySelector(".e-field-annots");
            if (fieldAnnotArea) {
              const before =
                fieldAnnotArea
                  .querySelector('[data-annot="before"]')
                  ?.value.trim() || "";
              const after =
                fieldAnnotArea
                  .querySelector('[data-annot="after"]')
                  ?.value.trim() || "";
              if (before || after) annotations[field.key] = { before, after };
            }
          });
        });

        return { sections, labels, visibility, options, annotations };
      }

      // ── Load existing template into editor ────────────────────────────────
      function loadTemplateIntoEditor(tmpl) {
        if (!tmpl) return;
        const {
          sections = {},
          labels = {},
          visibility = {},
          options = {},
          annotations = {},
        } = tmpl;

        EDITOR_SCHEMA.forEach((sec) => {
          const secEl = document.querySelector(`[data-section-id="${sec.id}"]`);
          if (!secEl) return;

          const secCfg = sections[sec.id];
          if (secCfg) {
            const secTog = secEl.querySelector(".sec-vis-tog");
            if (secTog && secCfg.visible === false) {
              secTog.checked = false;
              secEl.classList.add("e-off");
            }
            const secTitleInput = secEl.querySelector(".e-sec-title-input");
            if (secTitleInput && secCfg.title) {
              secTitleInput.value = secCfg.title;
            }
          }

          // Section-level annotations — restore values and open area if non-empty
          const secAnnot = annotations[sec.id];
          if (secAnnot && (secAnnot.before || secAnnot.after)) {
            const area = secEl.querySelector(".e-sec-annots");
            if (area) {
              const beforeEl = area.querySelector('[data-annot="before"]');
              const afterEl = area.querySelector('[data-annot="after"]');
              if (beforeEl && secAnnot.before) beforeEl.value = secAnnot.before;
              if (afterEl && secAnnot.after) afterEl.value = secAnnot.after;
              // Auto-open the annotation area
              area.classList.remove("hidden");
              const toggleBtn = secEl.querySelector(".e-toggle-annots");
              if (toggleBtn) {
                toggleBtn.textContent = "－";
                toggleBtn.classList.add("open");
              }
            }
          }

          sec.fields.forEach((field) => {
            const fieldEl = secEl.querySelector(
              `[data-field-key="${field.key}"]`,
            );
            if (!fieldEl) return;

            // Field visibility
            const fieldTog = fieldEl.querySelector(".field-vis-tog");
            if (fieldTog && visibility[field.key] === false) {
              fieldTog.checked = false;
              fieldEl.classList.add("e-off");
            }

            // Field label
            const fieldLabelInput = fieldEl.querySelector(
              ".e-field-label-input",
            );
            if (fieldLabelInput && labels[field.key]) {
              fieldLabelInput.value = labels[field.key];
            }

            // Option visibility
            if (field.options && options[field.key]) {
              const optMap = options[field.key];
              fieldEl.querySelectorAll(".e-option").forEach((optEl) => {
                const v = optEl.dataset.optKey;
                if (optMap[v] === false) {
                  const tog = optEl.querySelector(".opt-vis-tog");
                  if (tog) {
                    tog.checked = false;
                    optEl.classList.add("e-off");
                  }
                }
              });
            }

            // Field-level annotations — restore values and open area if non-empty
            const fieldAnnot = annotations[field.key];
            if (fieldAnnot && (fieldAnnot.before || fieldAnnot.after)) {
              const area = fieldEl.querySelector(".e-field-annots");
              if (area) {
                const beforeEl = area.querySelector('[data-annot="before"]');
                const afterEl = area.querySelector('[data-annot="after"]');
                if (beforeEl && fieldAnnot.before)
                  beforeEl.value = fieldAnnot.before;
                if (afterEl && fieldAnnot.after)
                  afterEl.value = fieldAnnot.after;
                // Auto-open the annotation area
                area.classList.remove("hidden");
                const toggleBtn = fieldEl.querySelector(
                  ".e-toggle-field-annots",
                );
                if (toggleBtn) {
                  toggleBtn.textContent = "－";
                  toggleBtn.classList.add("open");
                }
              }
            }
          });
        });
      }

      // ── Save ──────────────────────────────────────────────────────────────
      async function saveTemplate() {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;

        // Firestore connectivity check
        try {
          await Promise.race([
            getDoc(doc(db, "templates", "connectivity_test")),
            new Promise((_, reject) =>
              setTimeout(() => reject(new Error("接続タイムアウト")), 8000),
            ),
          ]);
        } catch (e) {
          showToast("Firestoreに接続できません: " + e.message, true);
          btn.disabled = false;
          return;
        }

        let template;
        try {
          template = collectTemplate();
        } catch (e) {
          showToast("収集エラー: " + e.message, true);
          btn.disabled = false;
          return;
        }

        const nameVal =
          (document.getElementById("templateNameInput")?.value || "").trim() ||
          "無題テンプレート";

        try {
          if (currentTemplateId) {
            // 既存テンプレートを更新
            await setDoc(
              doc(db, "templates", currentTemplateId),
              { name: nameVal, template, updatedAt: serverTimestamp() },
              { merge: true },
            );
            showToast("テンプレートを更新しました ✓");
            btn.disabled = false;
          } else {
            // 新規テンプレートを作成 → シートページへ移動
            const docRef = await addDoc(collection(db, "templates"), {
              name: nameVal,
              template,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp(),
            });
            showToast("保存しました ✓");
            setTimeout(() => {
              window.location.href = `./index.html?templateId=${docRef.id}`;
            }, 800);
          }
        } catch (e) {
          showToast("保存に失敗しました: " + e.message, true);
          btn.disabled = false;
        }
      }

      // ── Init ─────────────────────────────────────────────────────────────
      async function init() {
        buildEditorUI();
        document
          .getElementById("saveBtn")
          .addEventListener("click", saveTemplate);

        // Load existing template if ?templateId= is present
        const params = new URLSearchParams(location.search);
        const templateId = params.get("templateId");
        if (templateId) {
          try {
            const snap = await getDoc(doc(db, "templates", templateId));
            if (snap.exists()) {
              const snapData = snap.data();
              loadTemplateIntoEditor(snapData.template);
              const nameInput = document.getElementById("templateNameInput");
              if (nameInput && snapData.name) nameInput.value = snapData.name;
              currentTemplateId = templateId;
              showToast("テンプレートを読み込みました");
            } else {
              showToast("テンプレートが見つかりません — 新規作成します", true);
            }
          } catch (e) {
            showToast("読み込みエラー: " + e.message, true);
          }
        }
      }

      init();
    </script>
  </body>
</html>
