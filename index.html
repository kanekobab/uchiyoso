    <div class="toast" id="toast"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {

        getDoc,
        setDoc,
        addDoc,

      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import {

        RIBA_PREF_OPTS,
        R18_PREF_OPTS,
        R18_POSITION_OPTS,
        RP_POLICY_OPTS,

        REL_TAG_GROUPS,

        UNLOCK_CONDITION_OPTS,

        BODY_PART_ITEMS,
        COLOR_ITEMS,
        COLOR_MAP,
      } from "./js/schema.js";

      const app = initializeApp({
        apiKey: "AIzaSyADW4T9k6itj9a1hhCmi3ybkyTc9dbTDv0",
        authDomain: "trpg-36eac.firebaseapp.com",
        projectId: "trpg-36eac",
        storageBucket: "trpg-36eac.firebasestorage.app",
        messagingSenderId: "696095523246",
        appId: "1:696095523246:web:c9b543d8521b858d3a483f",
      });
      const db = getFirestore(app);

      // ── Options（js/schema.js からインポート済み）──────────────────────────

      // ── Field key → DOM anchor element map ───────────────────────────────
      // Used by applyTemplate() to locate each .field wrapper in the built DOM.
      // Each value is a lazy getter: called after initUI() has rendered the DOM.
      // charPreview IDs are direct; consent/request fields use owner- prefix.
      const FIELD_KEY_MAP = {
        // charPreview
        ownerCharPreview: () => document.getElementById("ownerCharPreview"),
        partnerCharPreview: () => document.getElementById("partnerCharPreview"),
        // relationship
        pairGender: () =>

        relationshipTags: () =>
          document.querySelector('[name="owner-consent-relationshipTags"]'),
        desiredRelationship: () =>
          document.getElementById("owner-request-desiredRelationship"),
        initialAffection: () =>
          document.getElementById("owner-request-initialAffection"),
        finalAffection: () =>
          document.getElementById("owner-request-finalAffection"),
        emotionTypes: () =>
          document.getElementById("owner-request-emotionTypes-wrap"),
        progressionTime: () =>
          document.querySelector('[name="owner-request-progressionTime"]'),
        desiredSituation: () =>

        // sexual
        ribaPref: () =>
          document.querySelector('[name="owner-request-ribaPref"]'),
        ribaCondition: () =>

        desiredPosition: () =>

        contactRange: () =>

        rpPolicy: () =>

        threelComment: () =>

        // sensitive
        r18Preference: () =>
          document.querySelector('[name="owner-consent-r18Preference"]'),
        r18Position: () =>
          document.querySelector('[name="owner-consent-r18Position"]'),
        r18gPreference: () =>
          document.querySelector('[name="owner-consent-r18gPreference"]'),
        r18gPosition: () =>
          document.querySelector('[name="owner-consent-r18gPosition"]'),
        sensitiveTags: () =>
          document.getElementById("owner-consent-sensitiveTags-group"),
        sensitiveNote: () =>
          document.getElementById("owner-consent-sensitiveNote"),
        // appearance
        ageRange: () => document.getElementById("owner-request-ageRange"),
        heightRange: () => document.getElementById("owner-request-heightRange"),
        bodyType: () => document.getElementById("owner-request-bodyType"),
        bodyParts: () =>
          document.getElementById("owner-request-bodyParts-group"),
        eyeShape: () => document.getElementById("owner-request-eyeShape"),
        eyeSize: () => document.getElementById("owner-request-eyeSize"),
        eyeColorList: () =>
          document.querySelector('[name="owner-request-eyeColorList"]'),
        eyeBrightness: () =>

        eyeSaturation: () =>

        eyebrowAngle: () =>
          document.getElementById("owner-request-eyebrowAngle"),
        eyebrowThickness: () =>
          document.getElementById("owner-request-eyebrowThickness"),
        eyebrowLength: () =>
          document.getElementById("owner-request-eyebrowLength"),
        eyebrowEyeDistance: () =>
          document.getElementById("owner-request-eyebrowEyeDistance"),
        faceImpression1: () =>
          document.getElementById("owner-request-faceImpression1"),
        faceImpression2: () =>
          document.getElementById("owner-request-faceImpression2"),
        hairWave: () => document.getElementById("owner-request-hairWave"),
        hairLength: () => document.getElementById("owner-request-hairLength"),
        hairColorList: () =>
          document.querySelector('[name="owner-request-hairColorList"]'),
        hairBrightness: () =>
          document.getElementById("owner-request-hairBrightness"),
        hairSaturation: () =>
          document.getElementById("owner-request-hairSaturation"),
        hairStyle: () => document.getElementById("owner-request-hairStyle"),
        vibe: () => document.getElementById("owner-request-vibe"),
        appearanceNG: () =>
          document.getElementById("owner-request-appearanceNG"),
        // personality
        lightDark: () => document.getElementById("owner-request-lightDark"),
        pastWeight: () => document.getElementById("owner-request-pastWeight"),
        sadismMasochism: () =>
          document.getElementById("owner-request-sadismMasochism"),
        tsunDere: () => document.getElementById("owner-request-tsunDere"),
        mentalStrength: () =>
          document.getElementById("owner-request-mentalStrength"),
        emotionExpression: () =>
          document.getElementById("owner-request-emotionExpression"),
        dependencyLevel: () =>
          document.getElementById("owner-request-dependencyLevel"),
        initiative: () => document.getElementById("owner-request-initiative"),
        personalSpace: () =>
          document.getElementById("owner-request-personalSpace"),
        trustStyle: () => document.getElementById("owner-request-trustStyle"),
        ethics: () => document.getElementById("owner-request-ethics"),
        extroversion: () =>
          document.getElementById("owner-request-extroversion"),
        intellectLevel: () =>
          document.getElementById("owner-request-intellectLevel"),
        secretiveness: () =>
          document.getElementById("owner-request-secretiveness"),
        innerVoice: () => document.getElementById("owner-request-innerVoice"),
        composure: () => document.getElementById("owner-request-composure"),
        pride: () => document.getElementById("owner-request-pride"),
        emotionWeight: () =>
          document.getElementById("owner-request-emotionWeight"),
        possessiveness: () =>
          document.getElementById("owner-request-possessiveness"),
        sincerity: () => document.getElementById("owner-request-sincerity"),
        likes: () => document.getElementById("owner-request-likes"),
        dislikes: () => document.getElementById("owner-request-dislikes"),
      };

      // ── Option DOM map ───────────────────────────────────────────────────
      // Used by applyTemplate() to locate individual option elements for hiding.
      // selector(v): CSS selector that finds the input/button for option value v.
      // wrapper: CSS class of the element to hide (.cb-chip / .radio-chip / .color-cb),
      //          or null to hide the matched element itself (toggle buttons).
      const OPTION_DOM_MAP = {
        pairGender: {
          selector: (v) => `[name="owner-consent-pairGender"][value="${v}"]`,
          wrapper: ".cb-chip",
        },
        relationshipTags: {
          selector: (v) =>
            `[name="owner-consent-relationshipTags"][value="${v}"]`,
          wrapper: ".cb-chip",
        },
        progressionTime: {
          selector: (v) =>
            `[name="owner-request-progressionTime"][value="${v}"]`,
          wrapper: ".cb-chip",
        },
        ribaPref: {
          selector: (v) => `[name="owner-request-ribaPref"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        desiredPosition: {
          selector: (v) =>
            `[name="owner-request-desiredPosition"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        contactRange: {
          selector: (v) => `[name="owner-consent-contactRange"][value="${v}"]`,
          wrapper: ".cb-chip",
        },
        rpPolicy: {
          selector: (v) => `[name="owner-consent-rpPolicy"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        r18Preference: {
          selector: (v) => `[name="owner-consent-r18Preference"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        r18Position: {
          selector: (v) => `[name="owner-consent-r18Position"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        r18gPreference: {
          selector: (v) =>
            `[name="owner-consent-r18gPreference"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        r18gPosition: {
          selector: (v) => `[name="owner-consent-r18gPosition"][value="${v}"]`,
          wrapper: ".radio-chip",
        },
        bodyParts: {
          selector: (v) => `#owner-request-bodyParts-group [data-key="${v}"]`,
          wrapper: null,
        },
        eyeColorList: {
          selector: (v) => `[name="owner-request-eyeColorList"][value="${v}"]`,
          wrapper: ".color-cb",
        },
        hairColorList: {
          selector: (v) => `[name="owner-request-hairColorList"][value="${v}"]`,
          wrapper: ".color-cb",
        },
        sensitiveTags: {
          selector: (v) =>
            `#owner-consent-sensitiveTags-group [data-key="${v}"]`,
          wrapper: null,
        },
      };

      // ── State ────────────────────────────────────────────────────────────
      let isDirty = false,
        collapseEnabled = false,
        editId = null; // null = 新規作成 / string = 既存ドキュメントの更新

      // ── Helpers ──────────────────────────────────────────────────────────
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      const safeKey = (s) =>
        s.replace(/[^a-zA-Z0-9\u3040-\u9FFF\u4E00-\u9FFF]/g, "_");

      // ── HTML builders ────────────────────────────────────────────────────
      function radioHtml(name, opts) {
        return `<div class="radio-group">${opts
          .map(
            ([v, l]) =>
              `<span class="radio-chip"><input type="radio" name="${name}" id="${name}-${v}" value="${v}"><label for="${name}-${v}">${l}</label></span>`,
          )
          .join("")}</div>`;
      }
      function checkboxHtml(name, opts) {
        return `<div class="checkbox-group">${opts
          .map(
            ([v, l]) =>
              `<span class="cb-chip"><input type="checkbox" name="${name}" id="${name}-${safeKey(v)}" value="${v}"><label for="${name}-${safeKey(v)}">${l}</label></span>`,
          )
          .join("")}</div>`;
      }
      // Flat checkbox list — groups define order but no category headers are rendered
      function groupedCheckboxHtml(name, groups) {
        const chips = groups
          .flatMap(([, items]) => items)
          .map((item) => {
            const sk = safeKey(item);
            return `<span class="cb-chip"><input type="checkbox" name="${name}" id="${name}-${sk}" value="${item}"><label for="${name}-${sk}">${item}</label></span>`;
          })
          .join("");
        return `<div class="checkbox-group">${chips}</div>`;
      }
      function colorPickHtml(name, items) {
        return `<div class="color-chip-group">${items
          .map((c) => {
            const cm = COLOR_MAP[c] || { bg: "#ccc", fg: "#333" };
            return `<span class="color-cb"><input type="checkbox" name="${name}" id="${name}-${c}" value="${c}"><label for="${name}-${c}" style="background:${cm.bg};color:${cm.fg};border-color:${cm.bg}">${c}</label></span>`;
          })
          .join("")}</div>`;
      }
      function togGroupHtml(groupId, items) {
        return `<div class="tog-group" id="${groupId}">${items
          .map(
            (item) =>
              `<button class="tog-btn" type="button" data-key="${item}" data-state="0">${item}</button>`,
          )
          .join("")}</div>`;
      }
      // Flat toggle button list — groups define order but no category headers are rendered
      function togGroupedHtml(groupId, groups) {
        const btns = groups
          .flatMap(([, items]) => items)
          .map(
            (item) =>
              `<button class="tog-btn" type="button" data-key="${item}" data-state="0">${item}</button>`,
          )
          .join("");
        return `<div class="tog-group" id="${groupId}">${btns}</div>`;
      }
      function dualRangeHtml(
        id,
        labelL,
        labelR,
        absMin,
        absMax,
        defMin,
        defMax,
        unit = "",
        showVal = false,
      ) {
        // Always show 11 ticks regardless of scale
        const tc = Math.min(absMax - absMin + 1, 11);
        const ticks = Array.from({ length: tc }, () => "<span></span>").join(
          "",
        );
        const valSpan = showVal
          ? `<span class="dr-val" id="${id}-disp">${defMin}〜${defMax}${unit}</span>`
          : "";
        return `<div class="dual-range-wrap" id="${id}" data-min="${absMin}" data-max="${absMax}" data-def-min="${defMin}" data-def-max="${defMax}" data-unit="${unit}" data-showval="${showVal ? 1 : 0}">
<div class="dual-range-labels-row"><span>${labelL}</span>${valSpan}<span>${labelR}</span></div>
<div class="dual-range-track"><div class="dr-bg"></div><div class="dr-fill" id="${id}-fill"></div>
<input type="range" class="dr-input" id="${id}-min" min="${absMin}" max="${absMax}" value="${defMin}">
<input type="range" class="dr-input" id="${id}-max" min="${absMin}" max="${absMax}" value="${defMax}">
</div><div class="slider-ticks">${ticks}</div></div>`;
      }
      function singleRangeHtml(
        id,
        labelL,
        labelR,
        defVal = 5,
        absMin = 0,
        absMax = 10,
      ) {
        return `<div class="sr-wrap" id="${id}-sr">
<div class="sr-labels"><span>${labelL}</span><span class="sr-val" id="${id}-sr-val">${defVal}</span><span>${labelR}</span></div>
<input type="range" class="sr-input" id="${id}" min="${absMin}" max="${absMax}" value="${defVal}">
</div>`;
      }
      function fieldHtml(label, content, note = "") {
        const lbl = label ? `<label class="field-label">${label}</label>` : "";
        return `<div class="field">${lbl}${note ? `<span class="field-note">${note}</span>` : ""}${content}</div>`;
      }
      function fieldRow2(f1, f2) {
        return `<div class="field-row-2">${f1}${f2}</div>`;
      }
      // Flat 2-column grid — accepts any number of fieldHtml() results.
      // Hidden items are removed from the DOM in applyTemplate() so the
      // grid always reflows to fill both columns with surviving items.
      function fieldGrid(...fields) {
        return `<div class="field-grid">${fields.join("")}</div>`;
      }
      function condFieldHtml(forName, inputId, placeholder = "条件・理由など", triggerVal = "conditional") {
        return `<div class="cond-field" data-cond-for="${forName}" data-cond-val="${triggerVal}" style="display:none"><div class="comment-input"><input type="text" id="${inputId}" placeholder="${placeholder}"></div></div>`;
      }
      function secHtml(id, title, body, opts = {}) {
        const badge = opts.important
          ? '<span class="badge-imp">重要</span>'
          : "";
        return `<div class="sec" id="${id}"><button class="sec-hd" type="button"><span class="sec-title-wrap"><span class="sec-title">${title}</span>${badge}</span><span class="sec-arrow">▼</span></button><div class="sec-body">${body}</div></div>`;
      }

      // ── Dynamic: Emotion Types ────────────────────────────────────────────
      function updateEmotionTypes(role) {
        const c = (k) => `${role}-consent-${k}`;
        const r = (k) => `${role}-request-${k}`;
        const selectedTags = $cbs(c("relationshipTags"));
        const wrap = document.getElementById(r("emotionTypes") + "-wrap");
        if (!wrap) return;

        if (selectedTags.length === 0) {
          wrap.innerHTML =
            '<span class="emotion-empty">関係タグを選択すると感情タイプが表示されます</span>';
          return;
        }

        const current = $cbs(r("emotionTypes"));
        wrap.innerHTML = `<div class="checkbox-group">${selectedTags
          .map((t) => {
            const sk = safeKey(t);
            const checked = current.includes(t) ? " checked" : "";
            return `<span class="cb-chip"><input type="checkbox" name="${r("emotionTypes")}" id="${r("emotionTypes")}-${sk}" value="${t}"${checked}><label for="${r("emotionTypes")}-${sk}">${t}</label></span>`;
          })
          .join("")}</div>`;
      }

      // ── Dynamic: Contact Conditions ────────────────────────────────────────
      function updateContactConditions(role) {
        const c = (k) => `${role}-consent-${k}`;
        const selected = $cbs(c("contactRange")).filter((v) => v !== "なし");
        const wrap = document.getElementById(`${role}-contact-conditions-wrap`);
        if (!wrap) return;

        if (selected.length === 0) {
          wrap.innerHTML = "";
          return;
        }

        wrap.innerHTML = selected
          .map((item) => {
            const sk = safeKey(item);
            const condName = `${c("contactConditions")}-${sk}`;
            const condOpts = UNLOCK_CONDITION_OPTS.map(([v, l]) => {
              const cbId = `${condName}-${v}`;
              return `<span class="cb-chip"><input type="checkbox" name="${condName}" id="${cbId}" value="${v}"><label for="${cbId}">${l}</label></span>`;
            }).join("");
            return `<div class="contact-cond-item"><span class="contact-cond-label">「${item}」の解放条件</span><div class="checkbox-group">${condOpts}</div></div>`;
          })
          .join("");
      }

      // ── Left column ──────────────────────────────────────────────────────
      function buildLeftSections() {
        const c = (k) => `owner-consent-${k}`;
        const r = (k) => `owner-request-${k}`;
        let html = "";

        // 1. キャラクター予定
        html += secHtml(
          "sec-charpreview",
          "✨ キャラクター予定（ラフ案）",
          fieldHtml(
            "自分のキャラ予定",
            `<textarea id="ownerCharPreview" placeholder="予定しているキャラのイメージ。確定でなくてOK"></textarea>`,
          ) +
            fieldHtml(
              "相手のキャラへの希望イメージ",
              `<textarea id="partnerCharPreview" placeholder="相手キャラに期待・想定しているイメージ"></textarea>`,
            ),
        );

        // 2. 関係
        html += secHtml(
          "sec-relreq",
          "💭 関係",
          // 関係タグ（グルーピング表示）
          // ペア種別（複数選択可に変更）
          fieldHtml(
            "今回やりたいペア種別（複数可）",
            checkboxHtml(c("pairGender"), PAIR_GENDER_OPTS),
          ) +
            fieldHtml(
              "今回やりたい関係タグ（複数可）",
              groupedCheckboxHtml(c("relationshipTags"), REL_TAG_GROUPS),
            ) +
            fieldHtml(
              "希望する関係の形",
              `<textarea id="${r("desiredRelationship")}" placeholder="どんな関係を望んでいるか"></textarea>`,
            ) +
            `<p class="sub-title">好感度・感情（相手のキャラ→自分のキャラへ向ける感情）</p>` +
            fieldRow2(
              fieldHtml(
                "初期好感度",
                dualRangeHtml(
                  r("initialAffection"),
                  "苦手",
                  "好き",
                  0,
                  10,
                  4,
                  6,
                ),
              ),
              fieldHtml(
                "最終好感度（想定）",
                dualRangeHtml(r("finalAffection"), "苦手", "好き", 0, 10, 4, 6),
              ),
            ) +
            fieldHtml(
              "感情タイプ（複数可）",
              `<div id="${r("emotionTypes")}-wrap"><span class="emotion-empty">↑ 上の「関係タグ」を選択すると候補が表示されます</span></div>`,
              "シナリオを通過し終わった時に行き着いて欲しい感情値はどこか",
            ) +
            // 関係値の進行時間について（感情タイプの下）
            fieldHtml(
              "関係値の進行時間について",
              checkboxHtml(r("progressionTime"), [
                ["oneshot", "1シナリオ内で最終ラインまで行きたい"],
                ["gradual", "継続を通じて段階を得たい"],
              ]),
            ) +
            // 希望するシチュエーション（その他コメントの上）
            fieldHtml(
              "希望するシチュエーション",
              `<textarea id="${r("desiredSituation")}" placeholder="こういう場面や展開を見たい など"></textarea>`,
            ),
        );

        // 3. 性的傾向（接触許容範囲）
        html += secHtml(
          "sec-pl3l",
          "💕 性的傾向（接触許容範囲）",
          fieldHtml(
            "左右の固定・リバについて（1つのみ）",
            radioHtml(r("ribaPref"), RIBA_PREF_OPTS),
          ) +
            condFieldHtml(
              r("ribaPref"),
              r("ribaCondition"),
              "条件を記入してください",
              "cond_riba",
            ) +
            `<p class="sub-title">自キャラが希望するポジション</p>` +
            fieldHtml(
              "今回のペアで、攻め受け形式が発生しそうな場合、どちらが良いか",
              radioHtml(r("desiredPosition"), POS_OPTS),
            ) +
            condFieldHtml(
              r("desiredPosition"),
              r("desiredPositionComment"),
              "補足・条件など",
            ) +
            `<p class="sub-title">展開の許容範囲</p>` +
            fieldHtml(
              "今回のペアにおける物理的接触の許容範囲（複数可）",
              checkboxHtml(
                c("contactRange"),
                CONTACT_RANGE_ITEMS.map((t) => [t, t]),
              ),
            ) +
            `<div id="owner-contact-conditions-wrap"></div>` +
            `<p class="sub-title">する場合、RPや描写表現</p>` +
            fieldHtml(
              "描写方針（1つ選択）",

      // ── Collapse detection ────────────────────────────────────────────────
      // defMin/defMax: the DEFAULT values rendered in the slider (not abs bounds)
      function rangeChg(v, defMin = 4, defMax = 6) {
        if (v == null) return false;
        if (typeof v === "object") return v.min !== defMin || v.max !== defMax;
        if (typeof v === "number") return v !== 5;
        return false;
      }

      // ── Apply template ────────────────────────────────────────────────────
      // Called after initUI(). Reads `template` from Firestore templates/{id}
      // and applies section/field/option visibility and label overrides to the DOM.
      //
      // Hidden fields are REMOVED from the DOM (not just display:none) so that:
      //   - .field-grid items reflow naturally to fill both columns
      //   - .field-row-2 wrappers are cleaned up properly
      //   - .sub-title headings with no visible children are also removed
      function applyTemplate(tmpl) {
        if (!tmpl) return;
        const {
          sections = {},
          labels = {},
          visibility = {},
          options = {},
          annotations = {},
        } = tmpl;

        // 1. Section visibility & title
        Object.entries(sections).forEach(([secId, cfg]) => {
          const secEl = document.getElementById(secId);
          if (!secEl) return;
          if (cfg.visible === false) secEl.style.display = "none";
          if (cfg.title) {
            const titleEl = secEl.querySelector(".sec-title");
            if (titleEl) titleEl.textContent = cfg.title;
          }
        });

        // 2. Field visibility & label — remove hidden fields from the DOM entirely
        Object.entries(FIELD_KEY_MAP).forEach(([key, getEl]) => {
          const el = getEl();
          if (!el) return;
          const fieldEl = el.closest(".field");
          if (!fieldEl) return;

          if (visibility[key] === false) {
            fieldEl.remove();
            return; // skip label update for removed element
          }
          if (labels[key]) {
            const labelEl = fieldEl.querySelector(".field-label");
            if (labelEl) labelEl.textContent = labels[key];
          }
        });

        // 3a. Clean up .field-row-2 wrappers after field removal:
        //     - remove if empty; span single survivor to full width
        document.querySelectorAll(".field-row-2").forEach((row) => {
          if (row.children.length === 0) {
            row.remove();
          } else if (row.children.length === 1) {
            row.children[0].style.gridColumn = "1 / -1";
          }
        });

        // 3b. Remove empty .field-grid wrappers (all grid items were removed)
        document.querySelectorAll(".field-grid").forEach((grid) => {
          if (grid.children.length === 0) grid.remove();
        });

        // 4. Auto-hide .sub-title headings whose section has no surviving .field
        //    elements following them (until the next .sub-title or end of parent).
        document.querySelectorAll(".sec-body").forEach((secBody) => {
          let currentSub = null;
          let fieldCount = 0;

          function evalSub() {
            if (currentSub && fieldCount === 0) currentSub.remove();
            currentSub = null;
            fieldCount = 0;
          }

          // Snapshot children before potential mutations
          Array.from(secBody.children).forEach((child) => {
            if (
              child.tagName === "P" &&
              child.classList.contains("sub-title")
            ) {
              evalSub();
              currentSub = child;
              fieldCount = 0;
            } else {
              // Count .field elements that are still in the DOM (attached nodes)
              const directField = child.classList.contains("field") ? 1 : 0;
              const nested = child.querySelectorAll
                ? child.querySelectorAll(".field").length
                : 0;
              fieldCount += directField + nested;
            }
          });
          evalSub(); // handle last group
        });

        // 4b. Appearance divider: remove the empty <p> before bodyParts when
        //     ageRange / heightRange / bodyType are all hidden
        const appDivider = document.getElementById("appearance-divider");
        if (appDivider) {
          const allGone =
            !document.getElementById("owner-request-ageRange") &&
            !document.getElementById("owner-request-heightRange") &&
            !document.getElementById("owner-request-bodyType");
          if (allGone) appDivider.remove();
        }

        // 5. Option visibility — hide individual chips/buttons marked false
        Object.entries(options).forEach(([fieldKey, optMap]) => {
          const domInfo = OPTION_DOM_MAP[fieldKey];
          if (!domInfo) return;
          Object.entries(optMap).forEach(([optValue, visible]) => {
            if (visible !== false) return;
            const found = document.querySelector(domInfo.selector(optValue));
            if (!found) return;
            const target = domInfo.wrapper
              ? found.closest(domInfo.wrapper)
              : found;
            if (target) target.style.display = "none";
          });
        });

        // 6. Annotations — insert <p class="annotation"> before/after targets
        //    Key = section ID (e.g. "sec-plsensitive") → targets .sec-body
        //    Key = field key  (e.g. "contactRange")    → targets .field via FIELD_KEY_MAP
        Object.entries(annotations).forEach(([key, annot]) => {
          const before = (annot.before || "").trim();
          const after = (annot.after || "").trim();
          if (!before && !after) return;

          if (key.startsWith("sec-")) {
            // Section-level: insert inside .sec-body of visible section
            const secEl = document.getElementById(key);
            if (!secEl || secEl.style.display === "none") return;
            const bodyEl = secEl.querySelector(".sec-body");
            if (!bodyEl) return;
            if (before)
              bodyEl.insertAdjacentHTML(
                "afterbegin",
                `<p class="sec-notice">${esc(before)}</p>`,
              );
            if (after)
              bodyEl.insertAdjacentHTML(
                "beforeend",
                `<p class="sec-notice">${esc(after)}</p>`,
              );
          } else {
            // Field-level: find field via FIELD_KEY_MAP, insert around .field
            const getEl = FIELD_KEY_MAP[key];
            if (!getEl) return;
            const anchor = getEl();
            if (!anchor) return; // field was removed from DOM (visibility: false)
            const fieldEl = anchor.closest(".field");
            if (!fieldEl) return;
            if (before)
              fieldEl.insertAdjacentHTML(
                "beforebegin",
                `<p class="sec-notice">${esc(before)}</p>`,
              );
            if (after)
              fieldEl.insertAdjacentHTML(
                "afterend",
                `<p class="sec-notice">${esc(after)}</p>`,
              );
          }
        });
      }

      // ── Dual range ────────────────────────────────────────────────────────
      function updateDualRange(id) {
        const wrap = document.getElementById(id);
        if (!wrap) return;
        const absMin = +wrap.dataset.min,
          absMax = +wrap.dataset.max;
        const minEl = document.getElementById(id + "-min"),
          maxEl = document.getElementById(id + "-max");
        if (!minEl || !maxEl) return;
        let vMin = +minEl.value,
          vMax = +maxEl.value;
        if (vMin > vMax) {
          [vMin, vMax] = [vMax, vMin];
          minEl.value = vMin;
          maxEl.value = vMax;
        }
        const range = absMax - absMin;
        const pMin = ((vMin - absMin) / range) * 100,
          pMax = ((vMax - absMin) / range) * 100;
        const fillEl = document.getElementById(id + "-fill");
        if (fillEl)
          fillEl.style.cssText = `left:${pMin}%;width:${pMax - pMin}%`;
        if (wrap.dataset.showval === "1") {
          const dispEl = document.getElementById(id + "-disp");
          if (dispEl)
            dispEl.textContent = vMin + "〜" + vMax + (wrap.dataset.unit || "");
        }
        // Changed-state: highlight fill + thumbs when value differs from defaults
        const defMin = +wrap.dataset.defMin;
        const defMax = +wrap.dataset.defMax;
        wrap.classList.toggle("changed", vMin !== defMin || vMax !== defMax);
      }

      function setDualRange(id, val, defMin = 4, defMax = 6) {
        let min = defMin,
          max = defMax;
        if (val != null) {
          if (typeof val === "object") {
            min = val.min ?? defMin;
            max = val.max ?? defMax;
          } else if (typeof val === "number") {
            min = max = val;
          }
        }
        const minEl = document.getElementById(id + "-min"),
          maxEl = document.getElementById(id + "-max");
        if (minEl) minEl.value = min;
        if (maxEl) maxEl.value = max;
        updateDualRange(id);
      }

      function getDualRange(id) {
        return {
          min: +(document.getElementById(id + "-min")?.value ?? 4),
          max: +(document.getElementById(id + "-max")?.value ?? 6),
        };
      }

      // ── Single range ──────────────────────────────────────────────────────
      function updateSingleRangeDisplay(id) {
        const input = document.getElementById(id);
        if (!input) return;
        const valEl = document.getElementById(id + "-sr-val");
        if (valEl) valEl.textContent = input.value;
        const pct =
          ((+input.value - +input.min) / (+input.max - +input.min)) * 100;
        input.style.background = `linear-gradient(to right, var(--primary) ${pct}%, var(--border) ${pct}%)`;
      }

      function initSingleRange(id) {
        const input = document.getElementById(id);
        if (!input) return;
        updateSingleRangeDisplay(id);
        input.addEventListener("input", () => {
          updateSingleRangeDisplay(id);
          markDirty();
        });
      }

      function setSingleRange(id, val) {
        const input = document.getElementById(id);
        if (!input) return;
        if (val != null) input.value = val;
        updateSingleRangeDisplay(id);
      }

      function getSingleRange(id) {
        return +(document.getElementById(id)?.value ?? 5);
      }

      // ── Conditional fields ────────────────────────────────────────────────
      function updateConditionalFields() {
        document
          .querySelectorAll(".cond-field[data-cond-for]")
          .forEach((wrap) => {
            const val = $r(wrap.dataset.condFor);
            const triggerVal = wrap.dataset.condVal || "conditional";
            wrap.style.display = val === triggerVal ? "" : "none";
          });
      }

      // ── UI init ───────────────────────────────────────────────────────────
      function initUI() {
        document.getElementById("left-sections").innerHTML =
          buildLeftSections();
        document.getElementById("right-sections").innerHTML =
          buildRightSections();

        document.querySelectorAll(".dual-range-wrap").forEach((wrap) => {
          const id = wrap.id;
          updateDualRange(id);
          document.getElementById(id + "-min").addEventListener("input", () => {
            updateDualRange(id);
            markDirty();
          });
          document.getElementById(id + "-max").addEventListener("input", () => {
            updateDualRange(id);
            markDirty();
          });
        });

        document.querySelectorAll(".sr-input").forEach((input) => {
          initSingleRange(input.id);
        });

        document.querySelectorAll(".sec-hd").forEach((btn) => {
          btn.addEventListener("click", () => {
            if (collapseEnabled) btn.closest(".sec").classList.toggle("closed");
          });
        });

        document.addEventListener("click", (e) => {
          const btn = e.target.closest(".tog-btn");
          if (btn) {
            btn.dataset.state = String((+btn.dataset.state + 1) % 3);
            markDirty();
          }
        });

        document.addEventListener("click", (e) => {
          const btn = e.target.closest(".detail-toggle");
          if (!btn) return;
          const targetId = btn.dataset.target;
          const section = document.getElementById(targetId);
          if (!section) return;
          const opening = !section.classList.contains("open");
          section.classList.toggle("open", opening);
          btn.classList.toggle("open", opening);
          btn.textContent = opening
            ? (btn.dataset.closeText || "▲ 詳細を隠す")
            : (btn.dataset.openText || "▼ 詳細を表示");
        });

        document.addEventListener("change", (e) => {
          if (e.target.type === "radio" || e.target.type === "checkbox") {
            updateConditionalFields();
            if (e.target.name === "owner-consent-relationshipTags") {
              updateEmotionTypes("owner");
            }
            if (e.target.name === "owner-consent-contactRange") {
              updateContactConditions("owner");
            }
            markDirty();
          }
        });
        document
          .querySelectorAll("input[type=text],textarea")
          .forEach((el) => el.addEventListener("input", markDirty));
      }

      // ── Toggle helpers ────────────────────────────────────────────────────
      const $togs = (groupId) => {
        const res = [];
        document.querySelectorAll(`#${groupId} .tog-btn`).forEach((b) => {
          if (b.dataset.state === "1") res.push(b.dataset.key);
          else if (b.dataset.state === "2") res.push("!" + b.dataset.key);
        });
        return res;
      };
      function setTogs(groupId, vals) {
        if (!Array.isArray(vals)) return;
        document.querySelectorAll(`#${groupId} .tog-btn`).forEach((b) => {
          const k = b.dataset.key;
          if (vals.includes(k)) b.dataset.state = "1";
          else if (vals.includes("!" + k)) b.dataset.state = "2";
          else b.dataset.state = "0";
        });
      }

      // ── Dirty state ───────────────────────────────────────────────────────
      function markDirty() {
        isDirty = true;
      }
      function setStatus(msg) {
        /* status bar removed */
      }

      // ── DOM helpers ───────────────────────────────────────────────────────
      const $v = (id) => {
        const e = document.getElementById(id);
        return e ? e.value : "";
      };
      const $r = (nm) => {
        const e = document.querySelector(`input[name="${nm}"]:checked`);
        return e ? e.value : "";
      };
      const $cbs = (nm) =>
        Array.from(
          document.querySelectorAll(`input[name="${nm}"]:checked`),
        ).map((e) => e.value);
      function setVal(id, v) {
        const e = document.getElementById(id);
        if (e && v != null) e.value = v;
      }
      function setRadio(nm, v) {
        if (!v) return;
        const e = document.querySelector(`input[name="${nm}"][value="${v}"]`);
        if (e) e.checked = true;
      }
      function setCbs(nm, vals) {
        if (!Array.isArray(vals)) return;
        vals.forEach((v) => {
          const e = document.querySelector(`input[name="${nm}"][value="${v}"]`);
          if (e) e.checked = true;
        });
      }

      // ── 入力済み項目のみ収集（スパース形式）──────────────────────────────────
      // 未入力・デフォルト値のフィールドは含めない。view.html への保存用。
      function collectSparseData() {
        const r = (k) => `owner-request-${k}`;
        const c = (k) => `owner-consent-${k}`;
        const data = {};

        // キャラクター予定
        const charPreview = {};
        const ownerPrev = $v("ownerCharPreview");
        const partnerPrev = $v("partnerCharPreview");
        if (ownerPrev) charPreview.ownerCharPreview = ownerPrev;
        if (partnerPrev) charPreview.partnerCharPreview = partnerPrev;
        if (Object.keys(charPreview).length) data.charPreview = charPreview;

        // 関係
        const rel = {};
        const relTags = $cbs(c("relationshipTags"));
        if (relTags.length) rel.relationshipTags = relTags;
        const pairGender = $cbs(c("pairGender"));
        if (pairGender.length) rel.pairGender = pairGender;
        const desiredRel = $v(r("desiredRelationship"));
        if (desiredRel) rel.desiredRelationship = desiredRel;
        const initAff = getDualRange(r("initialAffection"));
        if (rangeChg(initAff)) rel.initialAffection = initAff;
        const finalAff = getDualRange(r("finalAffection"));
        if (rangeChg(finalAff)) rel.finalAffection = finalAff;
        const emoTypes = $cbs(r("emotionTypes"));
        if (emoTypes.length) rel.emotionTypes = emoTypes;
        const progTime = $cbs(r("progressionTime"));
        if (progTime.length) rel.progressionTime = progTime;
        const desiredSit = $v(r("desiredSituation"));
        if (desiredSit) rel.desiredSituation = desiredSit;
        if (Object.keys(rel).length) data.relationship = rel;

        // 性的傾向
        const sex = {};
        const ribaPref = $r(r("ribaPref"));
        if (ribaPref) {
          sex.ribaPref = ribaPref;
          const ribaCond = $v(r("ribaCondition"));
          if (ribaCond) sex.ribaCondition = ribaCond;
        }
        const desiredPos = $r(r("desiredPosition"));
        if (desiredPos) {
          sex.desiredPosition = desiredPos;
          const posComment = $v(r("desiredPositionComment"));
          if (posComment) sex.desiredPositionComment = posComment;
        }
        const contactRange = $cbs(c("contactRange"));
        if (contactRange.length) {
          sex.contactRange = contactRange;
          const conds = {};
          CONTACT_RANGE_ITEMS.filter((it) => it !== "なし").forEach((it) => {
            const vals = $cbs(`${c("contactConditions")}-${safeKey(it)}`);
            if (vals.length) conds[it] = vals;
          });
          if (Object.keys(conds).length) sex.contactConditions = conds;
        }
        const r18Pos = $r(c("r18Position"));
        if (r18Pos) sex.r18Position = r18Pos;
        const r18gPos = $r(c("r18gPosition"));
        if (r18gPos) sex.r18gPosition = r18gPos;
        const rpPol = $r(c("rpPolicy"));
        if (rpPol) sex.rpPolicy = rpPol;
        const threelCom = $v(c("threelComment"));
        if (threelCom) sex.threelComment = threelCom;
        if (Object.keys(sex).length) data.sexual = sex;

        // 地雷・センシティブ
        const sens = {};
        const r18Pref = $r(c("r18Preference"));
        if (r18Pref) {
          sens.r18Preference = r18Pref;
          const r18Com = $v(c("r18Comment"));
          if (r18Com) sens.r18Comment = r18Com;
        }
        const r18gPref = $r(c("r18gPreference"));
        if (r18gPref) {
          sens.r18gPreference = r18gPref;
          const r18gCom = $v(c("r18gComment"));
          if (r18gCom) sens.r18gComment = r18gCom;
        }
        const sensitives = $togs(c("sensitiveTags") + "-group");
        if (sensitives.length) sens.sensitiveTags = sensitives;
        const sensitiveNote = $v(c("sensitiveNote"));
        if (sensitiveNote) sens.sensitiveNote = sensitiveNote;
        if (Object.keys(sens).length) data.sensitive = sens;

        // 外見
        const app = {};
        const ageR = getDualRange(r("ageRange"));
        if (rangeChg(ageR, 18, 29)) app.ageRange = ageR;
        const htR = getDualRange(r("heightRange"));
        if (rangeChg(htR, 150, 180)) app.heightRange = htR;
        const bodyT = getDualRange(r("bodyType"));
        if (rangeChg(bodyT)) app.bodyType = bodyT;
        const bodyParts = $togs(r("bodyParts") + "-group");
        if (bodyParts.length) app.bodyParts = bodyParts;
        [
          ["eyeShape", r("eyeShape")],
          ["eyeSize", r("eyeSize")],
          ["eyeBrightness", r("eyeBrightness")],
          ["eyeSaturation", r("eyeSaturation")],
          ["eyebrowAngle", r("eyebrowAngle")],
          ["eyebrowThickness", r("eyebrowThickness")],
          ["eyebrowLength", r("eyebrowLength")],
          ["eyebrowEyeDistance", r("eyebrowEyeDistance")],
          ["faceImpression1", r("faceImpression1")],
          ["faceImpression2", r("faceImpression2")],
          ["hairWave", r("hairWave")],
          ["hairLength", r("hairLength")],
          ["hairBrightness", r("hairBrightness")],
          ["hairSaturation", r("hairSaturation")],
        ].forEach(([key, id]) => {
          const v = getDualRange(id);
          if (rangeChg(v)) app[key] = v;
        });
        const eyeColors = $cbs(r("eyeColorList"));
        if (eyeColors.length) app.eyeColorList = eyeColors;
        const hairColors = $cbs(r("hairColorList"));
        if (hairColors.length) app.hairColorList = hairColors;
        const hairStyle = $v(r("hairStyle"));
        if (hairStyle) app.hairStyle = hairStyle;
        const vibe = $v(r("vibe"));
        if (vibe) app.vibe = vibe;
        const appNG = $v(r("appearanceNG"));
        if (appNG) app.appearanceNG = appNG;
        if (Object.keys(app).length) data.appearance = app;

        // 性格
        const pers = {};
        [
          "lightDark",
          "pastWeight",
          "sadismMasochism",
          "tsunDere",
          "mentalStrength",
          "emotionExpression",
          "dependencyLevel",
          "initiative",
          "personalSpace",
          "trustStyle",
          "ethics",
          "extroversion",
          "intellectLevel",
          "secretiveness",
          "innerVoice",
          "composure",
          "pride",
          "emotionWeight",
          "possessiveness",
          "sincerity",
        ].forEach((key) => {
          const v = getDualRange(r(key));
          if (rangeChg(v)) pers[key] = v;
        });
        const likes = $v(r("likes"));
        if (likes) pers.likes = likes;
        const dislikes = $v(r("dislikes"));
        if (dislikes) pers.dislikes = dislikes;
        if (Object.keys(pers).length) data.personality = pers;

        return data;
      }

      // ── 新フロー: 保存 → view.html へ遷移 ──────────────────────────────────
      async function saveAndRedirect() {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        setStatus("接続確認中…");

        // ① Firestore 疎通確認（既存ドキュメント読み取りで接続テスト）
        try {
          console.log("[save] Firestore疎通確認中...");
          await Promise.race([
            getDoc(doc(db, "pairs", "connectivity_test")),
            new Promise((_, reject) =>
              setTimeout(() => reject(new Error("接続タイムアウト")), 8000),
            ),
          ]);
          console.log("[save] Firestore疎通OK");
        } catch (e) {
          console.error("[save] Firestore疎通失敗:", e.message);
          setStatus("接続エラー — インターネット接続を確認してください");
          showToast("Firestoreに接続できません: " + e.message, true);
          btn.disabled = false;
          return;
        }

        setStatus("保存中…");

        // ② collectSparseData のエラーを先に分離
        let sparseData;
        try {
          sparseData = collectSparseData();
          console.log("[save] collectSparseData OK", sparseData);
        } catch (e) {
          console.error("[save] collectSparseData failed", e);
          setStatus("収集エラー: " + e.message);
          btn.disabled = false;
          return;
        }

        // ③ Firestore 保存（新規 or 更新）
        let savedId;
        try {
          if (editId) {
            // 編集モード: 既存ドキュメントを上書き
            console.log("[save] setDoc (update) start, id =", editId);
            await setDoc(
              doc(db, "pairs", editId),
              {
                // セキュリティルール hasAll() 互換フィールド
                pairId: "",
                owner: {},
                partner: {},
                relationship: "",
                settings: "",
                questionnaire: {},
                characterPreview: {},
                updatedAt: serverTimestamp(),
                // 実データ
                data: sparseData,
              },
              { merge: true },
            );
            savedId = editId;
            console.log("[save] setDoc OK, id =", savedId);
          } else {
            // 新規作成
            console.log("[save] addDoc start");
            const docRef = await addDoc(collection(db, "pairs"), {
              // セキュリティルール hasAll() 互換フィールド
              pairId: "",
              owner: {},
              partner: {},
              relationship: "",
              settings: "",
              questionnaire: {},
              characterPreview: {},
              updatedAt: serverTimestamp(),
              // 実データ
              data: sparseData,
              createdAt: serverTimestamp(),
            });
            savedId = docRef.id;
            console.log("[save] addDoc OK, id =", savedId);
          }
        } catch (e) {
          console.error("[save] 保存失敗", e);
          setStatus("保存エラー: " + e.message);
          showToast("保存に失敗しました: " + e.message, true);
          btn.disabled = false;
          return;
        }

        // ④ 遷移
        console.log("[save] redirect実行", savedId);
        window.location.href = `./view.html?id=${savedId}`;
      }

      // ── populateSparseData ────────────────────────────────────────────────
      // sparseData（view.html 保存形式）をフォームに反映する。
      // 編集モード（?id=）でロード後に呼ばれる。
      function populateSparseData(sparseData) {
        if (!sparseData) return;
        const r = (k) => `owner-request-${k}`;
        const c = (k) => `owner-consent-${k}`;

        // キャラクター予定
        const cp = sparseData.charPreview || {};
        setVal("ownerCharPreview", cp.ownerCharPreview);
        setVal("partnerCharPreview", cp.partnerCharPreview);

        // 関係
        const rel = sparseData.relationship || {};
        setCbs(c("pairGender"), rel.pairGender);
        setCbs(c("relationshipTags"), rel.relationshipTags);
        // 感情タイプは関係タグ選択後に動的生成 → updateEmotionTypes で再生成してからセット
        updateEmotionTypes("owner");
        setCbs(r("emotionTypes"), rel.emotionTypes);
        setCbs(r("progressionTime"), rel.progressionTime);
        setVal(r("desiredRelationship"), rel.desiredRelationship);
        setDualRange(r("initialAffection"), rel.initialAffection, 4, 6);
        setDualRange(r("finalAffection"), rel.finalAffection, 4, 6);
        setVal(r("desiredSituation"), rel.desiredSituation);

        // 性的傾向
        const sex = sparseData.sexual || {};
        setRadio(r("ribaPref"), sex.ribaPref);
        setVal(r("ribaCondition"), sex.ribaCondition);
        setRadio(r("desiredPosition"), sex.desiredPosition);
        setVal(r("desiredPositionComment"), sex.desiredPositionComment);
        setCbs(c("contactRange"), sex.contactRange);
        updateContactConditions("owner");
        if (
          sex.contactConditions &&
          typeof sex.contactConditions === "object"
        ) {
          Object.entries(sex.contactConditions).forEach(([item, vals]) => {
            const sk = safeKey(item);
            if (Array.isArray(vals))
              setCbs(`${c("contactConditions")}-${sk}`, vals);
          });
        }
        setRadio(c("r18Position"), sex.r18Position);
        setRadio(c("r18gPosition"), sex.r18gPosition);
        setRadio(c("rpPolicy"), sex.rpPolicy);
        setVal(c("threelComment"), sex.threelComment);

        // 地雷・センシティブ
        const sen = sparseData.sensitive || {};
        setRadio(c("r18Preference"), sen.r18Preference);
        setVal(c("r18Comment"), sen.r18Comment);
        setRadio(c("r18gPreference"), sen.r18gPreference);
        setVal(c("r18gComment"), sen.r18gComment);
        setTogs(c("sensitiveTags") + "-group", sen.sensitiveTags);
        setVal(c("sensitiveNote"), sen.sensitiveNote);

        // 外見
        const app = sparseData.appearance || {};
        setDualRange(r("ageRange"), app.ageRange, 18, 29);
        setDualRange(r("heightRange"), app.heightRange, 150, 180);
        setDualRange(r("bodyType"), app.bodyType, 4, 6);
        setTogs(r("bodyParts") + "-group", app.bodyParts);
        setDualRange(r("eyeShape"), app.eyeShape, 4, 6);
        setDualRange(r("eyeSize"), app.eyeSize, 4, 6);
        setCbs(r("eyeColorList"), app.eyeColorList);
        setDualRange(r("eyeBrightness"), app.eyeBrightness, 4, 6);
        setDualRange(r("eyeSaturation"), app.eyeSaturation, 4, 6);
        setDualRange(r("eyebrowAngle"), app.eyebrowAngle, 4, 6);
        setDualRange(r("eyebrowThickness"), app.eyebrowThickness, 4, 6);
        setDualRange(r("eyebrowLength"), app.eyebrowLength, 4, 6);
        setDualRange(r("eyebrowEyeDistance"), app.eyebrowEyeDistance, 4, 6);
        setDualRange(r("faceImpression1"), app.faceImpression1, 4, 6);
        setDualRange(r("faceImpression2"), app.faceImpression2, 4, 6);
        setDualRange(r("hairWave"), app.hairWave, 4, 6);
        setDualRange(r("hairLength"), app.hairLength, 4, 6);
        setCbs(r("hairColorList"), app.hairColorList);
        setDualRange(r("hairBrightness"), app.hairBrightness, 4, 6);
        setDualRange(r("hairSaturation"), app.hairSaturation, 4, 6);
        setVal(r("hairStyle"), app.hairStyle);
        setVal(r("vibe"), app.vibe);
        setVal(r("appearanceNG"), app.appearanceNG);

        // 性格
        const per = sparseData.personality || {};
        setDualRange(r("lightDark"), per.lightDark, 4, 6);
        setDualRange(r("pastWeight"), per.pastWeight, 4, 6);
        setDualRange(r("sadismMasochism"), per.sadismMasochism, 4, 6);
        setDualRange(r("tsunDere"), per.tsunDere, 4, 6);
        setDualRange(r("mentalStrength"), per.mentalStrength, 4, 6);
        setDualRange(r("emotionExpression"), per.emotionExpression, 4, 6);
        setDualRange(r("dependencyLevel"), per.dependencyLevel, 4, 6);
        setDualRange(r("initiative"), per.initiative, 4, 6);
        setDualRange(r("personalSpace"), per.personalSpace, 4, 6);
        setDualRange(r("trustStyle"), per.trustStyle, 4, 6);
        setDualRange(r("ethics"), per.ethics, 4, 6);
        setDualRange(r("extroversion"), per.extroversion, 4, 6);
        setDualRange(r("intellectLevel"), per.intellectLevel, 4, 6);
        setDualRange(r("secretiveness"), per.secretiveness, 4, 6);
        setDualRange(r("innerVoice"), per.innerVoice, 4, 6);
        setDualRange(r("composure"), per.composure, 4, 6);
        setDualRange(r("pride"), per.pride, 4, 6);
        setDualRange(r("emotionWeight"), per.emotionWeight, 4, 6);
        setDualRange(r("possessiveness"), per.possessiveness, 4, 6);
        setDualRange(r("sincerity"), per.sincerity, 4, 6);
        setVal(r("likes"), per.likes);
        setVal(r("dislikes"), per.dislikes);

        updateConditionalFields();
      }

      // ── [削除済み: Summary view / loadData / saveData / copyURL / copySummaryURL] ──
      // これらの関数は view.html への移管・フロー変更に伴い不要となったため削除。
      // 参照: CLAUDE.md「Dead Code」セクション
      // ── Toast ─────────────────────────────────────────────────────────────
      let toastTimer;
      function showToast(msg, isErr = false) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show" + (isErr ? " error" : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
      }

      // ── Bootstrap ─────────────────────────────────────────────────────────
      async function init() {
        initUI();
        document
          .getElementById("saveBtn")
          .addEventListener("click", saveAndRedirect);

        const params = new URLSearchParams(location.search);

        // -- ?editor=true: カスタマイズボタンを表示 --
        const isEditor = params.get("editor") === "true";
        if (isEditor) {
          document.getElementById("hd").classList.add("editor-mode");
        }

        // -- ?id=: 編集モード（既存データをロードしてフォームに反映）--
        const docId = params.get("id");
        if (docId) {
          editId = docId;
          try {
            console.log("[edit] ドキュメント読み込み中, id =", docId);
            const snap = await getDoc(doc(db, "pairs", docId));
            if (snap.exists()) {
              const sparseData = snap.data().data || {};
              populateSparseData(sparseData);
              console.log("[edit] フォーム反映完了");
            } else {
              console.warn("[edit] ドキュメントが見つかりません:", docId);
              showToast(
                "データが見つかりません。新規作成として扱います。",
                true,
              );
              editId = null;
            }
          } catch (e) {
            console.error("[edit] 読み込み失敗:", e);
            showToast("データの読み込みに失敗しました。", true);
            editId = null;
          }
        }

        // -- ?templateId=: テンプレートを取得して適用 --
        const templateId = params.get("templateId");
        if (templateId) {
          // エディタリンクを templateId 付きに更新（戻って再編集できるように）
          const editBtn = document.getElementById("editBtn");
          if (editBtn) editBtn.href = `./editor.html?templateId=${templateId}`;

          try {
            const tmplSnap = await getDoc(doc(db, "templates", templateId));
            if (tmplSnap.exists()) {
              applyTemplate(tmplSnap.data().template);
            }
          } catch (e) {
            console.error("[template] load failed:", e);
          }
        }
      }

      init();
    </script>
  </body>
</html>
